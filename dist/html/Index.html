            <a href="#" class="text-white text-xl font-semibold">FeedBox</a>
        </div>

        <div class="hidden md:flex space-x-6 items-center">
            <a href="#" class="text-white hover:text-gray-200">Home</a>
            <a href="/dist/html/Course.html" class="text-white hover:text-gray-200">Courses</a>

    <div id="mobile-menu" class="hidden bg-indigo-600 space-y-2 p-4">

  <body class="bg-gradient-to-br from-blue-200 to-blue-300 font-sans antialiased">
  <div class="flex items-center justify-center h-screen">
    <div class="w-full max-w-lg bg-white bg-opacity-90 p-8 rounded-xl shadow-2xl transform transition duration-200 hover:scale-105">
      <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Login to Your Account</h2>
      <form action="#" method="POST" class="space-y-6">
        <div>
          <label for="phone" class="block text-sm  font-medium text-gray-700">Phone No.</label>
          <input type="text" maxlength="10" id="phone" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm " placeholder="Enter your Phone No.">
        </div>

        <div class="relative">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" name="password" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm " placeholder="Enter your password">
          
          <button type="button" onclick="togglePassword()" class="absolute top-1/2 right-3 flex items-center text-gray-500 hover:text-gray-700">
            <span id="toggle-text"><i class="fa-regular fa-eye-slash"></i></span>
          </button>
        </div>

        <div class="items-center justify-between w-full">
          <a href="#" class="text-sm text-indigo-600 hover:text-indigo-800">Forgot password?</a>
        </div>

        
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg ">
          Login
        </button>
      </form>
      <p class="text-center text-sm text-gray-600 mt-6">
        Don’t have an account? <a href="./signUp.html" class="text-indigo-600 hover:text-indigo-800 font-semibold">Sign up</a>
      </p>
    </div>
  </div>

  <script src="/dist/js/SignIn.js"></script>
</body>
</html>
