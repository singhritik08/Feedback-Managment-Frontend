</head>


<!-- Navbar -->

    <div class="container mx-auto flex items-center justify-between">
        <a href="#" class="text-white text-xl font-semibold">FeedBox</a>
        <div class="hidden md:flex space-x-6">
            <a href="#" class="text-white hover:text-gray-200">Home</a>
            <a href="/dist/html/Course.html" class="text-white hover:text-gray-200">Courses</a>
            <a href="#" class="text-white hover:text-gray-200">About</a>
            <a href="#" class="text-white hover:text-gray-200">Contact</a>
            <a href="/dist/html/signUp.html" class="text-white hover:text-gray-200">Profile</a>
        </div>
        <button id="menu-btn" class="block md:hidden text-white focus:outline-none">
            <i class="fa-solid fa-bars" style="color: #ffffff;"></i>
        </button>
    </div>
    <!-- for mobile view -->
    <div id="mobile-menu" class="hidden md:hidden bg-indigo-600 space-y-2 p-4">
        <a href="#" class="block text-white hover:text-gray-200">Home</a>
        <a href="#" class="block text-white hover:text-gray-200">Courses</a>
        <a href="#" class="block text-white hover:text-gray-200">About</a>
        <a href="#" class="block text-white hover:text-gray-200">Contact</a>
        <a href="#" class="block text-white hover:text-gray-200">Profile</a>
    </div>
</nav>
<!-- Navbar Ends-->

<div class="container mx-auto p-8">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-blue-700">Our Courses</h1>
        <p class="text-blue-600 mt-2 text-lg">Explore our courses designed to help you grow</p>
    </div>

    <div class="flex flex-col md:flex-row gap-8">
        <!-- Course List Section -->
        <div class="w-full md:w-1/3 bg-white shadow-lg rounded-lg p-6 border-t-4 border-blue-500">
            <h2 class="text-2xl font-semibold text-blue-700 mb-6">Courses</h2>
            <ul id="courseList" class="space-y-6">

            </ul>
        </div>

        <!-- Course Details Section -->
        <div class="w-full md:w-2/3 bg-white shadow-lg rounded-lg p-8 border-t-4 border-blue-500">
            <h2 id="courseTitle" class="text-2xl font-bold text-blue-700 mb-4">Course Details</h2>
            <p id="courseInstructor" class="text-blue-700 font-semibold text-lg mb-2"></p>
            <p id="courseDescription" class="text-blue-600 text-lg mb-6">Select a course to see more details.</p>
            
            <div id="actionButtons" class="hidden flex gap-4 mt-6">
                <button
                    class="bg-green-500 text-white font-semibold py-2 px-4 rounded hover:bg-green-600 transition">Submit
                    Assignment</button>
                <button onclick="window.location.href='/dist/html/Feedback.html'"
                    class="bg-blue-500 text-white font-semibold py-2 px-4 rounded hover:bg-blue-600 transition">Give
                    Feedback</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('menu-btn').addEventListener('click', function () {
        document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    
    async function fetchCourses() {
        try {
            const response = await fetch('http://localhost:8080/api/course/get/all/Course');
            const courses = await response.json();

            const courseList = document.getElementById('courseList');
            courseList.innerHTML = '';

            courses.forEach(course => {
                const courseItem = document.createElement('li');
                courseItem.className = 'p-4 bg-white rounded-lg shadow-md cursor-pointer transform transition duration-300 hover:shadow-lg hover:scale-105 hover:bg-blue-50';
                courseItem.innerHTML = `
                    <h3 class="font-medium text-blue-800">${course.name}</h3>
                    <p class="text-sm text-blue-600">${course.description}</p>
                    <p class="text-sm text-gray-500">Instructor: ${course.instructor}</p>
                `;
                courseItem.onclick = () => showCourseDetails(course.name, course.description, course.instructor);
                courseList.appendChild(courseItem);
            });
        } catch (error) {
            console.error('Error fetching courses:', error);
        }
    }

    function showCourseDetails(title, description, instructor) {
        document.getElementById('courseTitle').textContent = title;
        document.getElementById('').textContent = `Instructor: ${instructor}`;
        document.getElementById('courseDescriptcourseInstructorion').textContent = description;
        document.getElementById('actionButtons').classList.remove('hidden');
    }

    fetchCourses();
</script>
</body>

</html>
