<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Feedback</title>
    <link rel="stylesheet" href="/dist/output.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-indigo-600 p-4">
        <div class="container mx-auto flex items-center justify-between">
           
            <div class="flex items-center space-x-2">
                <img src="/dist/Images/feedbox-logo.png" alt="FeedBox Logo" class="w-12 h-10">
                <a href="#" class="text-white text-xl font-semibold">FeedBox</a>
            </div>
            
            <div class="hidden md:flex space-x-6">
                <a href="#" class="text-white hover:text-gray-200">Home</a>
                <a href="/dist/html/Course.html" class="text-white hover:text-gray-200">Courses</a>
                <a href="#" class="text-white hover:text-gray-200">About</a>
                <a href="#" class="text-white hover:text-gray-200">Contact</a>
                <a href="/dist/html/signUp.html" class="text-white hover:text-gray-200">SignUp</a>
            </div>
    
            <!-- Mobile Menu Button -->
            <button id="menu-btn" class="block md:hidden text-white focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    
        <!-- Mobile Menu (Hidden by default) -->
        <div id="mobile-menu" class="hidden md:hidden bg-indigo-600 space-y-2 p-4">
            <a href="#" class="block text-white hover:text-gray-200">Home</a>
            <a href="/dist/html/Course.html" class="block text-white hover:text-gray-200">Courses</a>
            <a href="#" class="block text-white hover:text-gray-200">About</a>
            <a href="#" class="block text-white hover:text-gray-200">Contact</a>
            <a href="/dist/html/signUp.html" class="block text-white hover:text-gray-200">SignUp</a>
        </div>
    </nav>
    <!-- Navbar Ends-->

    <!-- Feedback Form -->
    <div class="container mx-auto p-8">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-blue-700">Course Feedback</h1>
            <p class="text-blue-600 mt-2 text-lg">Please share your thoughts on the course!</p>
        </div>

        <div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-lg border-t-4 border-blue-500">
            <form action="#" method="POST">
                <!-- Rating Section -->
                <div class="mb-6">
                    <label for="rating" class="block text-xl font-semibold text-blue-700 mb-2">Rate the Course</label>
                    <div class="flex items-center space-x-2">
                        <button type="button" class="text-yellow-500 text-5xl" onclick="setRating(1)">★</button>
                        <button type="button" class="text-yellow-500 text-5xl" onclick="setRating(2)">★</button>
                        <button type="button" class="text-yellow-500 text-5xl" onclick="setRating(3)">★</button>
                        <button type="button" class="text-yellow-500 text-5xl" onclick="setRating(4)">★</button>
                        <button type="button" class="text-yellow-500 text-5xl" onclick="setRating(5)">★</button>
                    </div>
                    <p id="ratingText" class="text-blue-600 mt-2">Select a rating</p>
                    <input type="hidden" id="rating" name="rating" value="0">
                </div>
                <div>
                <label for="instructorName" class="block text-xl font-semibold text-blue-700 mb-2">Instructor Name</label>
                    <input id="instructorName" name="instructorName" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="Enter Your Instructor Name"></input>
                </div>

                <!-- Comments Section -->
                <div class="mb-6">
                    <label for="comments" class="block text-xl font-semibold text-blue-700 mb-2">Comments</label>
                    <textarea id="comments" name="comments" rows="4" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="Share your feedback..."></textarea>
                </div>
                

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-300">
                    Submit Feedback
                </button>
            </form>
        </div>
    </div>

    <script>
        // Function to set rating based on star click
        function setRating(value) {
            document.getElementById('rating').value = value;
            document.getElementById('ratingText').textContent = 'Rating: ' + value + ' stars';
        }
    </script>
</body>
</html>
